name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Tests
      env:
        SLACK_BOT_TOKEN: xoxb-dummy
        SLACK_APP_TOKEN: xapp-dummy
        GEMINI_API_KEY: dummy-key
      run: |
        # プロジェクトルートをPythonパスとして認識させてテストを実行
        PYTHONPATH=. python -m pytest tests/

  deploy:
    name: Deploy to Raspberry Pi
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # GitHub側の共通サーバーで実行
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          # ラズパイ上で実行するコマンド群
          script: |
            cd /home/r410/kakeibo-ai
            git pull origin main
            
            # 環境の更新
            /home/r410/miniconda3/bin/conda env update -n kakeibo-ai -f environment.yml
            /home/r410/miniconda3/bin/conda run -n kakeibo-ai pip install -r requirements.txt
            
            # Systemd ユニットファイルの更新
            sudo cp infra/systemd/kakeibo-*.service /etc/systemd/system/
            sudo cp infra/systemd/kakeibo-*.timer /etc/systemd/system/
            sudo systemctl daemon-reload
            
            # 各サービスの再起動
            sudo systemctl restart kakeibo-slack.service
            sudo systemctl restart kakeibo-dashboard.service
            sudo systemctl restart kakeibo-review.timer
            
            # 完了通知
            export COMMIT_MSG="$(git log -1 --pretty=format:'%s')"
            /home/r410/miniconda3/bin/conda run -n kakeibo-ai python -c "import os; from src.output.slack_notifier import SlackNotifier; from src import __version__; msg = os.environ.get('COMMIT_MSG', '取得できませんでした'); SlackNotifier().send_notification('🚀 アップデート完了', f'Kakeibo AI (v{__version__}) が本番環境に正常にデプロイされました！\n\n*更新内容:*\n> {msg}')"
