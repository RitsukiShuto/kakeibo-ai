services:
  slack:
    build: .
    container_name: kakeibo-slack
    restart: unless-stopped
    env_file:
      - prod_local/.env
    volumes:
      - ./prod_local:/app/local
      - ./logs:/app/logs
      - ./data:/app/data
      - ./reports:/app/reports
    command: python src/output/slack_server.py

  backend:
    build: .
    container_name: kakeibo-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - prod_local/.env
    volumes:
      - ./prod_local:/app/local
      - ./logs:/app/logs
      - ./data:/app/data
      - ./reports:/app/reports
    command: python src/api/main.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kakeibo-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    volumes:
      - ./infra/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  cron:
    build: .
    container_name: kakeibo-cron
    restart: unless-stopped
    env_file:
      - prod_local/.env
    volumes:
      - ./prod_local:/app/local
      - ./logs:/app/logs
      - ./data:/app/data
      - ./reports:/app/reports
    entrypoint: /bin/bash /app/infra/docker/entrypoint-cron.sh
