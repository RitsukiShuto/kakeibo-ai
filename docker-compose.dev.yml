services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kakeibo-api-dev
    network_mode: "host"
    command: python src/api/main.py
    volumes:
      - .:/app
      - ./dev_local:/app/local
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=http://127.0.0.1:11434
      - KAKEIBO_DB_PATH=local/kakeibo.db
      - KAKEIBO_LOCAL_DIR=dev_local

  slack:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kakeibo-slack-dev
    network_mode: "host"
    command: python src/output/slack_server.py
    volumes:
      - .:/app
      - ./dev_local:/app/local
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=http://127.0.0.1:11434
      - KAKEIBO_DB_PATH=local/kakeibo.db
      - KAKEIBO_LOCAL_DIR=dev_local

  cron:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kakeibo-cron-dev
    network_mode: "host"
    entrypoint: /bin/bash /app/infra/docker/entrypoint-cron.sh
    volumes:
      - .:/app
      - ./dev_local:/app/local
      - ./logs:/app/logs
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=http://127.0.0.1:11434
      - KAKEIBO_DB_PATH=local/kakeibo.db
      - KAKEIBO_LOCAL_DIR=dev_local
      - IS_DEV_ENV=true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kakeibo-frontend-dev
    network_mode: "host"

volumes:
  ollama_data:
