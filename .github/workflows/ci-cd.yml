name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
        
    - name: Run Tests
      env:
        SLACK_BOT_TOKEN: xoxb-dummy
        SLACK_APP_TOKEN: xapp-dummy
        GEMINI_API_KEY: dummy-key
      run: |
        # Start Streamlit server for E2E tests
        KAKEIBO_DB_PATH=local/test_dashboard.db streamlit run dashboard.py --server.headless true &
        sleep 5
        # プロジェクトルートをPythonパスとして認識させてテストを実行
        PYTHONPATH=. python -m pytest tests/

  deploy:
    name: Deploy to Raspberry Pi
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # ラズパイ上の Runner で実行
    runs-on: self-hosted
    
    steps:
      - name: Update code and restart containers
        run: |
          cd /home/r410/kakeibo-ai
          git pull origin main
          # Docker イメージのビルドとコンテナの再起動
          docker compose build
          docker compose up -d
          
      - name: Slack Notification (Success)
        if: success()
        run: |
          cd /home/r410/kakeibo-ai
          export COMMIT_MSG="$(git log -1 --pretty=format:'%s')"
          # slack コンテナを使用して通知を送信
          docker compose run --rm slack python -c "import os; from src.output.slack_notifier import SlackNotifier; from src import __version__; msg = os.environ.get('COMMIT_MSG', '取得できませんでした'); SlackNotifier().send_notification('🚀 アップデート完了 (Docker)', f'Kakeibo AI (v{__version__}) が Docker 環境に正常にデプロイされました！\n\n*更新内容:*\n> {msg}')"

      - name: Slack Notification (Failure)
        if: failure()
        run: |
          cd /home/r410/kakeibo-ai
          docker compose run --rm slack python -c "from src.output.slack_notifier import SlackNotifier; SlackNotifier().send_notification('❌ デプロイ失敗 (Docker)', 'Docker 環境へのアップデート中にエラーが発生しました。エラーログを確認してください。')"
