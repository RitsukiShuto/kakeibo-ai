name: CI/CD Pipeline

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  # 1. 高速フィードバック用の検証 (マージ前チェック)
  validate:
    name: Build Check (Fast Feedback)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Fast Unit Tests (Backend)
      env:
        KAKEIBO_CONFIG_DIR: tests/config
      run: |
        mkdir -p tests/config
        cp prod_local/config/*.json.example tests/config/
        for f in tests/config/*.json.example; do mv "$f" "${f%.example}"; done
        PYTHONPATH=. python -m pytest tests/ --ignore=tests/test_dashboard_e2e.py

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build Check (Frontend)
      run: |
        cd frontend
        npm install
        npm run build

  # 2. Deployment (mainブランチへのマージ時のみ実行)
  deploy:
    name: Deploy to Raspberry Pi
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Update code and restart containers
        run: |
          cd /home/r410/kakeibo-ai
          git fetch origin main
          git reset --hard origin/main
          
          # Docker containers update
          docker compose build
          docker compose up -d
          
          # Systemd services update (API, Slack, Dashboard, Timer)
          # setup_systemd.sh を実行して最新のサービス定義を反映・有効化
          chmod +x tools/setup_systemd.sh
          # パスワード入力なしで実行できるよう、一部の権限は事前にユーザー側で設定されている前提
          # または、sudoers で設定されている前提。ここでは実行を試みる。
          ./tools/setup_systemd.sh

      - name: Slack Notification (Success)
        if: success()
        run: |
          cd /home/r410/kakeibo-ai
          export COMMIT_MSG="$(git log -1 --pretty=format:'%s')"
          docker compose run --rm slack python -c "import os; from src.output.slack_notifier import SlackNotifier; from src import __version__; msg = os.environ.get('COMMIT_MSG', 'なし'); SlackNotifier().send_notification('🚀 デプロイ完了 (Docker)', f'Kakeibo AI (v{__version__}) が正常に更新されました。\n\n*最終コミット:*\n> {msg}')"

      - name: Slack Notification (Failure)
        if: failure()
        run: |
          cd /home/r410/kakeibo-ai
          docker compose run --rm slack python -c "import os; from src.output.slack_notifier import SlackNotifier; SlackNotifier().send_notification('❌ デプロイ失敗 (Docker)', 'デプロイ中にエラーが発生しました。ログを確認してください。')"

  # 3. Deployment to Staging (stagingブランチへのプッシュ時のみ実行)
  deploy-staging:
    name: Deploy to Staging (Raspberry Pi)
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: self-hosted
    steps:
      - name: Update code and restart containers
        run: |
          # ターゲットディレクトリがない場合は作成 (初回のみ)
          if [ ! -d "/home/r410/STG_kakeibo-ai" ]; then
            mkdir -p /home/r410/STG_kakeibo-ai
            cd /home/r410/STG_kakeibo-ai
            git init
            git remote add origin https://github.com/r410/kakeibo-ai.git
          fi
          cd /home/r410/STG_kakeibo-ai
          git fetch origin staging
          git reset --hard origin/staging
          
          # 環境構築用ディレクトリの作成
          mkdir -p staging/local staging/logs staging/data staging/reports
          
          # .env がない場合は初期化
          if [ ! -f "staging/local/.env" ]; then
            if [ -f "local/.env" ]; then
              cp local/.env staging/local/.env
            else
              touch staging/local/.env
            fi
          fi

          # Docker containers update
          docker compose -f docker-compose.staging.yml build
          docker compose -f docker-compose.staging.yml up -d

      - name: Slack Notification (Success)
        if: success()
        run: |
          cd /home/r410/STG_kakeibo-ai
          export COMMIT_MSG="$(git log -1 --pretty=format:'%s')"
          docker compose -f docker-compose.staging.yml run --rm slack python -c "import os; from src.output.slack_notifier import SlackNotifier; from src import __version__; msg = os.environ.get('COMMIT_MSG', 'なし'); SlackNotifier().send_notification('🧪 Staging デプロイ完了', f'Kakeibo AI Staging (v{__version__}) が正常に更新されました。\n\n*最終コミット:*\n> {msg}')"

      - name: Slack Notification (Failure)
        if: failure()
        run: |
          cd /home/r410/STG_kakeibo-ai
          docker compose -f docker-compose.staging.yml run --rm slack python -c "import os; from src.output.slack_notifier import SlackNotifier; SlackNotifier().send_notification('❌ Staging デプロイ失敗', 'Staging環境のデプロイ中にエラーが発生しました。ログを確認してください。')"
