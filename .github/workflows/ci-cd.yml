name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. PR・マージ後の共通バリデーション（単体テスト & ビルドチェック）
  validate:
    name: Unit Tests & Build Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # キャッシュ有効化
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies (Backend)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Install dependencies (Frontend)
      run: |
        cd frontend
        npm install

    - name: Run Unit Tests (Backend)
      env:
        SLACK_BOT_TOKEN: xoxb-dummy
        SLACK_APP_TOKEN: xapp-dummy
        GEMINI_API_KEY: dummy-key
      run: |
        # E2E以外のテストを実行
        PYTHONPATH=. python -m pytest -m "not e2e" tests/

    - name: Build Frontend
      run: |
        cd frontend
        npm run build

  # 2. Regression & E2E (mainブランチのみ、または手動実行)
  regression:
    name: Regression & E2E Tests
    needs: validate
    # mainブランチへのプッシュ（マージ）時のみ実行
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
        cd frontend
        npm install
        npx playwright install chromium

    - name: Run E2E Tests
      env:
        SLACK_BOT_TOKEN: xoxb-dummy
        SLACK_APP_TOKEN: xapp-dummy
        GEMINI_API_KEY: dummy-key
        KAKEIBO_CONFIG_DIR: tests/config
        KAKEIBO_DB_PATH: local/test_dashboard.db
      run: |
        mkdir -p tests/config
        cp local/config/*.json.example tests/config/
        for f in tests/config/*.json.example; do mv "$f" "${f%.example}"; done
        
        # Initialize test database
        PYTHONPATH=. python -c "from tests.test_dashboard_e2e import setup_test_db; setup_test_db()"
        
        # Start Backend & Frontend
        PYTHONPATH=. python src/api/main.py &
        (cd frontend && npm run dev -- --port 5173) &
        sleep 15
        
        # Run All Tests (Regression)
        PYTHONPATH=. python -m pytest tests/
        cd frontend && npx playwright test

  # 3. Deployment (Regression合格後)
  deploy:
    name: Deploy to Raspberry Pi
    needs: regression
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Update code and restart containers
        run: |
          cd /home/r410/kakeibo-ai
          git pull origin main
          docker compose build
          docker compose up -d
          
      - name: Slack Notification (Success)
        if: success()
        run: |
          cd /home/r410/kakeibo-ai
          export COMMIT_MSG="$(git log -1 --pretty=format:'%s')"
          docker compose run --rm slack python -c "import os; from src.output.slack_notifier import SlackNotifier; from src import __version__; msg = os.environ.get('COMMIT_MSG', '取得できませんでした'); SlackNotifier().send_notification('🚀 アップデート完了 (Docker)', f'Kakeibo AI (v{__version__}) が Docker 環境に正常にデプロイされました！\n\n*更新内容:*\n> {msg}')"

      - name: Slack Notification (Failure)
        if: failure()
        run: |
          cd /home/r410/kakeibo-ai
          docker compose run --rm slack python -c "from src.output.slack_notifier import SlackNotifier; SlackNotifier().send_notification('❌ デプロイ失敗 (Docker)', 'Docker 環境へのアップデート中にエラーが発生しました。エラーログを確認してください。')"
