name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. 高速フィードバック用の検証 (マージ前チェック)
  validate:
    name: Build Check (Fast Feedback)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Fast Unit Tests (Backend)
      env:
        KAKEIBO_CONFIG_DIR: tests/config
      run: |
        mkdir -p tests/config
        cp local/config/*.json.example tests/config/
        for f in tests/config/*.json.example; do mv "$f" "${f%.example}"; done
        PYTHONPATH=. python -m pytest tests/ --ignore=tests/test_dashboard_e2e.py

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build Check (Frontend)
      run: |
        cd frontend
        npm install
        npm run build

  # 2. Deployment (mainブランチへのマージ時のみ実行)
  deploy:
    name: Deploy to Raspberry Pi
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Update code and restart containers
        run: |
          cd /home/r410/kakeibo-ai
          git fetch origin main
          git reset --hard origin/main
          docker compose build
          docker compose up -d

      - name: Slack Notification (Success)
        if: success()
        run: |
          cd /home/r410/kakeibo-ai
          export COMMIT_MSG="$(git log -1 --pretty=format:'%s')"
          docker compose run --rm slack python -c "import os; from src.output.slack_notifier import SlackNotifier; from src import __version__; msg = os.environ.get('COMMIT_MSG', 'なし'); SlackNotifier().send_notification('🚀 デプロイ完了 (Docker)', f'Kakeibo AI (v{__version__}) が正常に更新されました。\n\n*最終コミット:*\n> {msg}')"

      - name: Slack Notification (Failure)
        if: failure()
        run: |
          cd /home/r410/kakeibo-ai
          docker compose run --rm slack python -c "import os; from src.output.slack_notifier import SlackNotifier; SlackNotifier().send_notification('❌ デプロイ失敗 (Docker)', 'デプロイ中にエラーが発生しました。ログを確認してください。')"
