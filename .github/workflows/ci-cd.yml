name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Tests
      env:
        SLACK_BOT_TOKEN: xoxb-dummy
        SLACK_APP_TOKEN: xapp-dummy
        GEMINI_API_KEY: dummy-key
      run: |
        # プロジェクトルートをPythonパスとして認識させてテストを実行
        PYTHONPATH=. python -m pytest tests/

  deploy:
    name: Deploy to Raspberry Pi
    needs: test
    # Pull Request時はテストのみ実行し、デプロイはmainにマージ(push)された時だけ走らせる
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    
    steps:
      - name: Update code in production directory
        run: |
          cd /home/r410/kakeibo-ai
          git pull origin main
          
      - name: Update Conda environment
        run: |
          cd /home/r410/kakeibo-ai
          /home/r410/miniconda3/bin/conda env update -n kakeibo-ai -f environment.yml
          /home/r410/miniconda3/bin/conda run -n kakeibo-ai pip install -r requirements.txt
          
      - name: Slack Notification (Success)
        if: success()
        run: |
          cd /home/r410/kakeibo-ai
          export COMMIT_MSG="$(git log -1 --pretty=format:'%s')"
          /home/r410/miniconda3/bin/conda run -n kakeibo-ai python -c "import os; from src.output.slack_notifier import SlackNotifier; from src import __version__; msg = os.environ.get('COMMIT_MSG', '取得できませんでした'); SlackNotifier().send_notification('🚀 アップデート完了', f'Kakeibo AI (v{__version__}) が本番環境に正常にデプロイされました！\n\n*更新内容:*\n> {msg}')"

      - name: Slack Notification (Failure)
        if: failure()
        run: |
          cd /home/r410/kakeibo-ai
          /home/r410/miniconda3/bin/conda run -n kakeibo-ai python -c "from src.output.slack_notifier import SlackNotifier; SlackNotifier().send_notification('❌ デプロイ失敗', '本番環境へのアップデート中にエラーが発生しました。エラーログを確認してください。')"
